{% extends "main/layout.html" %}
{% block content %}
<div style="max-width:600px;margin:40px auto;background:white;padding:24px;border-radius:8px;">
  <h2>Đặt lại mật khẩu</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" style="padding:10px 18px;background:#52c41a;color:white;border-radius:6px;border:none;">Lưu mật khẩu mới</button>
  </form>
</div>
{% endblock %}
