{% extends 'main/layout.html' %}

{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px">
  <div style="background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); width: 100%; max-width: 480px; padding: 40px">
    
    <!-- Header -->
    <div style="text-align: center; margin-bottom: 30px">
      <h1 style="font-size: 28px; font-weight: 700; color: #1a1a1a; margin: 0 0 8px 0">Đăng Ký</h1>
      <p style="color: #666; font-size: 14px; margin: 0">Tạo tài khoản HomeStore mới</p>
    </div>

    <!-- Error Messages -->
    {% if messages %}
    <div style="background: #fee; border-left: 4px solid #ff4444; padding: 12px; border-radius: 4px; margin-bottom: 20px">
      {% for message in messages %}
      <p style="margin: 4px 0; color: #c00; font-size: 13px">
        <i class="fa-solid fa-exclamation-circle"></i> {{ message }}
      </p>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" style="width: 100%" id="register-form">
      {% csrf_token %}

      <!-- Full Name Field -->
      <div style="margin-bottom: 18px">
        <label style="display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px">
          <i class="fa-solid fa-user" style="margin-right: 6px; color: #667eea"></i> Họ và tên
        </label>
        <input
          type="text"
          name="fullname"
          style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease"
          placeholder="Nhập họ và tên của bạn"
          onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
          onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none'"
        />
      </div>

      <!-- Email Field -->
      <div style="margin-bottom: 18px">
        <label style="display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px">
          <i class="fa-solid fa-envelope" style="margin-right: 6px; color: #667eea"></i> Email
        </label>
        <input
          type="email"
          name="email"
          style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease"
          placeholder="Nhập email của bạn"
          onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
          onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none'"
        />
      </div>

      <!-- Username Field -->
      <div style="margin-bottom: 18px">
        <label style="display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px">
          <i class="fa-solid fa-at" style="margin-right: 6px; color: #667eea"></i> Tên đăng nhập
        </label>
        <input
          type="text"
          name="username"
          required
          id="username"
          style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease"
          placeholder="Chọn tên đăng nhập"
          onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
          onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none'"
          minlength="5"
        />
        <small style="color: #999; font-size: 12px; display: block; margin-top: 4px">Tối thiểu 5 ký tự</small>
      </div>

      <!-- Password Field -->
      <div style="margin-bottom: 18px">
        <label style="display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px">
          <i class="fa-solid fa-lock" style="margin-right: 6px; color: #667eea"></i> Mật khẩu
        </label>
        <div style="position: relative">
          <input
            type="password"
            name="password"
            required
            id="password-input"
            style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease"
            placeholder="Nhập mật khẩu mạnh"
            onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'; checkPasswordStrength()"
            onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none'"
            oninput="checkPasswordStrength()"
            minlength="6"
          />
          <button
            type="button"
            onclick="togglePassword()"
            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #666; cursor: pointer; font-size: 16px; padding: 0"
          >
            <i class="fa-solid fa-eye" id="toggle-icon"></i>
          </button>
        </div>

        <!-- Password Strength Indicator -->
        <div style="margin-top: 8px">
          <div style="display: flex; gap: 4px; margin-bottom: 4px">
            <div id="strength-bar-1" style="flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; transition: all 0.3s ease"></div>
            <div id="strength-bar-2" style="flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; transition: all 0.3s ease"></div>
            <div id="strength-bar-3" style="flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; transition: all 0.3s ease"></div>
          </div>
          <small id="strength-text" style="color: #999; font-size: 12px">Mật khẩu yếu</small>
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div style="margin-bottom: 24px">
        <label style="display: block; font-weight: 600; color: #333; margin-bottom: 8px; font-size: 14px">
          <i class="fa-solid fa-lock-check" style="margin-right: 6px; color: #667eea"></i> Xác nhận mật khẩu
        </label>
        <div style="position: relative">
          <input
            type="password"
            name="confirm_password"
            required
            id="confirm-password-input"
            style="width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; transition: all 0.3s ease"
            placeholder="Xác nhận mật khẩu"
            onfocus="this.style.borderColor='#667eea'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)'"
            onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none'"
          />
          <span id="match-indicator" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 16px"></span>
        </div>
        <small id="match-text" style="color: #999; font-size: 12px; display: block; margin-top: 4px"></small>
      </div>

      <!-- Terms & Conditions -->
      <div style="display: flex; gap: 10px; margin-bottom: 24px; align-items: flex-start">
        <input
          type="checkbox"
          name="terms"
          required
          id="terms-checkbox"
          style="margin-top: 3px; cursor: pointer"
        />
        <label style="cursor: pointer; color: #666; font-size: 13px; line-height: 1.4">
          Tôi đồng ý với
          <a href="#" style="color: #667eea; text-decoration: none; font-weight: 500">Điều khoản dịch vụ</a>
          và
          <a href="#" style="color: #667eea; text-decoration: none; font-weight: 500">Chính sách bảo mật</a>
        </label>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        onclick="return validateForm()"
        style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4)"
        onmouseover="this.style.boxShadow='0 6px 20px rgba(102, 126, 234, 0.6)'; this.style.transform='translateY(-2px)'"
        onmouseout="this.style.boxShadow='0 4px 15px rgba(102, 126, 234, 0.4)'; this.style.transform='translateY(0)'"
      >
        <i class="fa-solid fa-user-plus" style="margin-right: 8px"></i> Tạo Tài Khoản
      </button>
    </form>

    <!-- Divider -->
    <div style="display: flex; align-items: center; margin: 24px 0; gap: 10px">
      <div style="flex: 1; height: 1px; background: #e0e0e0"></div>
      <span style="color: #999; font-size: 12px">Hoặc</span>
      <div style="flex: 1; height: 1px; background: #e0e0e0"></div>
    </div>

    <!-- Social Sign Up -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px">
      <button
        style="padding: 10px; border: 2px solid #e0e0e0; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px"
        onmouseover="this.style.borderColor='#667eea'; this.style.background='#f8f9ff'"
        onmouseout="this.style.borderColor='#e0e0e0'; this.style.background='white'"
      >
        <i class="fa-brands fa-google" style="color: #ea4335"></i> Google
      </button>
      <button
        style="padding: 10px; border: 2px solid #e0e0e0; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px"
        onmouseover="this.style.borderColor='#667eea'; this.style.background='#f8f9ff'"
        onmouseout="this.style.borderColor='#e0e0e0'; this.style.background='white'"
      >
        <i class="fa-brands fa-facebook" style="color: #1877f2"></i> Facebook
      </button>
    </div>

    <!-- Login Link -->
    <div style="text-align: center; padding-top: 20px; border-top: 1px solid #e0e0e0">
      <p style="color: #666; font-size: 14px; margin: 0">
        Đã có tài khoản?
        <a href="{% url 'main:login' %}" style="color: #667eea; text-decoration: none; font-weight: 600; transition: all 0.3s ease" onmouseover="this.style.color='#764ba2'" onmouseout="this.style.color='#667eea'">
          Đăng nhập
        </a>
      </p>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password-input');
  const icon = document.getElementById('toggle-icon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

function checkPasswordStrength() {
  const password = document.getElementById('password-input').value;
  const bar1 = document.getElementById('strength-bar-1');
  const bar2 = document.getElementById('strength-bar-2');
  const bar3 = document.getElementById('strength-bar-3');
  const text = document.getElementById('strength-text');

  let strength = 0;

  if (password.length >= 6) strength++;
  if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
  if (/[0-9]/.test(password)) strength++;
  if (/[!@#$%^&*]/.test(password)) strength++;

  bar1.style.background = strength >= 1 ? '#ff9800' : '#e0e0e0';
  bar2.style.background = strength >= 2 ? '#4caf50' : '#e0e0e0';
  bar3.style.background = strength >= 4 ? '#4caf50' : (strength >= 3 ? '#2196f3' : '#e0e0e0');

  if (strength === 0) {
    text.textContent = 'Mật khẩu yếu';
    text.style.color = '#ff9800';
  } else if (strength === 1) {
    text.textContent = 'Mật khẩu yếu';
    text.style.color = '#ff9800';
  } else if (strength === 2) {
    text.textContent = 'Mật khẩu trung bình';
    text.style.color = '#2196f3';
  } else if (strength === 3) {
    text.textContent = 'Mật khẩu khá mạnh';
    text.style.color = '#2196f3';
  } else {
    text.textContent = 'Mật khẩu rất mạnh';
    text.style.color = '#4caf50';
  }

  // Check password match
  checkPasswordMatch();
}

function checkPasswordMatch() {
  const password = document.getElementById('password-input').value;
  const confirm = document.getElementById('confirm-password-input').value;
  const indicator = document.getElementById('match-indicator');
  const text = document.getElementById('match-text');

  if (confirm === '') {
    indicator.textContent = '';
    text.textContent = '';
    return;
  }

  if (password === confirm) {
    indicator.innerHTML = '<i class="fa-solid fa-check-circle" style="color: #4caf50"></i>';
    text.textContent = 'Mật khẩu trùng khớp';
    text.style.color = '#4caf50';
  } else {
    indicator.innerHTML = '<i class="fa-solid fa-times-circle" style="color: #ff4444"></i>';
    text.textContent = 'Mật khẩu không trùng khớp';
    text.style.color = '#ff4444';
  }
}

function validateForm() {
  const password = document.getElementById('password-input').value;
  const confirm = document.getElementById('confirm-password-input').value;
  const terms = document.getElementById('terms-checkbox').checked;

  if (password !== confirm) {
    alert('Mật khẩu không trùng khớp!');
    return false;
  }

  if (!terms) {
    alert('Vui lòng đồng ý với Điều khoản dịch vụ!');
    return false;
  }

  return true;
}

// Listen to confirm password field
document.getElementById('confirm-password-input').addEventListener('input', checkPasswordMatch);
</script>

{% endblock %}
