<div style="position: relative; width: 240px; min-width: 240px; background: white; border-radius: 8px; border: 1px solid #e8e8e8; overflow: hidden; transition: all 0.3s ease">
  {% if badge_text %}
    <span style="position: absolute; top: 12px; right: 12px; background: {% if badge_class == 'badge-hot' %}#ff5722{% else %}#52c41a{% endif %}; color: white; padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; z-index: 10">{{ badge_text }}</span>
  {% endif %}
  
  <a href="{% url 'main:product_detail' product.id %}" style="text-decoration: none; color: inherit; display: block">
    <div style="position: relative; width: 100%; height: 200px; background: #f5f5f5; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: transform 0.3s ease" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
      {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width: 100%; height: 100%; object-fit: cover" />
      {% else %}
        <div style="display: flex; align-items: center; justify-content: center; color: #ccc">
          <i class="fa-solid fa-image" style="font-size: 48px"></i>
        </div>
      {% endif %}
    </div>
  </a>

  <div style="padding: 12px">
    <h4 style="margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: #333; line-height: 1.4; height: 28px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical">
      <a href="{% url 'main:product_detail' product.id %}" style="text-decoration: none; color: #333; transition: color 0.3s" onmouseover="this.style.color='#1890ff'" onmouseout="this.style.color='#333'">{{ product.name }}</a>
    </h4>
    
    <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 8px">
      <span style="color: #ffc107; font-size: 12px">★★★★★</span>
      <span style="color: #999; font-size: 11px">(5.0)</span>
    </div>
    
    <div style="color: #1890ff; font-weight: bold; font-size: 18px; margin-bottom: 10px">{{ product.formatted_price }}đ</div>
    
    <button class="add-to-cart-btn" data-product-id="{{ product.id }}" data-product-name="{{ product.name }}" style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: 100%; background: #1a1a1a; color: white; padding: 8px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all 0.3s ease" onmouseover="this.style.background='#333'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='#1a1a1a'; this.style.transform='translateY(0)'">
      <i class="fa-solid fa-cart-plus"></i> Thêm
    </button>
  </div>
</div>
